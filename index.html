<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>听书小助手</title>
  <style>
    body {
      max-width: 700px;
      margin: auto;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .controls label {
      margin-right: 5px;
      white-space: nowrap;
      font-weight: 500;
      color: #555;
    }

    select, input[type="number"], input[type="file"] {
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    button:hover {
      background-color: #45a049;
      transform: translateY(-1px);
    }

    button.secondary {
      background-color: #2196F3;
    }

    button.secondary:hover {
      background-color: #1976D2;
    }

    button.warning {
      background-color: #FF9800;
    }

    button.warning:hover {
      background-color: #F57C00;
    }

    button.danger {
      background-color: #f44336;
    }

    button.danger:hover {
      background-color: #d32f2f;
    }

    textarea {
      width: 100%;
      height: 50vh;
      margin-top: 10px;
      padding: 15px;
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: vertical;
      box-sizing: border-box;
    }

    .upload-section {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      margin-bottom: 15px;
      cursor: pointer;
      transition: border-color 0.3s;
    }

    .upload-section:hover {
      border-color: #4CAF50;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      display: none;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }

    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }

    .status.info {
      background: #e3f2fd;
      color: #1565c0;
      display: block;
    }
  </style>
</head>
<body>
  <h1>📖 听书小助手</h1>

  <div id="statusMessage" class="status"></div>

  <div class="card">
    <h3 style="margin-top: 0;">📁 上传本地小说</h3>
    <div class="upload-section">
      <input type="file" id="fileInput" accept=".txt" style="display: none;" />
      <p style="margin: 0 0 10px 0;">点击这里或拖拽文件上传</p>
      <button class="secondary" onclick="document.getElementById('fileInput').click()">选择文件</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top: 0;">📚 GitHub 仓库小说</h3>
    <div class="controls">
      <label for="folderSelect">选择小说：</label>
      <select id="folderSelect"></select>
    </div>
    <div class="controls">
      <label for="novelSelect">选择文件：</label>
      <select id="novelSelect"></select>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top: 0;">🔊 朗读设置</h3>
    <div class="controls">
      <label for="voiceSelect">音色：</label>
      <select id="voiceSelect"></select>

      <label for="rate">速度：</label>
      <input type="number" id="rate" value="1" min="0.5" max="2" step="0.1" style="width: 60px;" />
    </div>
    <div class="controls">
      <label for="pitch">音调：</label>
      <input type="number" id="pitch" value="1" min="0.5" max="2" step="0.1" style="width: 60px;" />

      <label for="volume">音量：</label>
      <input type="number" id="volume" value="1" min="0" max="1" step="0.1" style="width: 60px;" />
    </div>
    <div class="controls">
      <label for="timer">定时朗读（分钟）：</label>
      <input type="number" id="timer" value="0" min="0" />
    </div>
    <div class="controls">
      <label for="chapterSelect">选择章节：</label>
      <select id="chapterSelect"></select>
    </div>
  </div>

  <div class="btn-group">
    <button onclick="play()">▶️ 播放</button>
    <button class="warning" onclick="pause()">⏸️ 暂停 / 继续</button>
    <button class="danger" onclick="stop()">⏹️ 停止</button>
    <button class="secondary" onclick="prevChapter()">⬅️ 上一章</button>
    <button class="secondary" onclick="nextChapter()">➡️ 下一章</button>
  </div>

  <textarea id="textDisplay" readonly></textarea>

  <script>
    const GITHUB_USER = "hsira";
    const GITHUB_REPO = "hsira.github.io";
    const GITHUB_PATH = "novels";

    const folderSelect = document.getElementById("folderSelect");
    const novelSelect = document.getElementById("novelSelect");
    const chapterSelect = document.getElementById("chapterSelect");
    const textDisplay = document.getElementById("textDisplay");
    const timerInput = document.getElementById("timer");
    const voiceSelect = document.getElementById("voiceSelect");
    const rateInput = document.getElementById("rate");
    const pitchInput = document.getElementById("pitch");
    const volumeInput = document.getElementById("volume");
    const fileInput = document.getElementById("fileInput");
    const statusMessage = document.getElementById("statusMessage");

    let chapters = [];
    let currentChapter = 0;
    const synth = window.speechSynthesis;
    let utterance = null;
    let endTime = null;
    let voices = [];

    function showStatus(message, type = "info") {
      statusMessage.textContent = message;
      statusMessage.className = "status " + type;
      setTimeout(() => {
        if (type !== "error") statusMessage.className = "status";
      }, 3000);
    }

    function loadVoices() {
      voices = synth.getVoices().filter(voice => voice.lang.startsWith("zh"));
      voiceSelect.innerHTML = "";
      voices.forEach((voice, index) => {
        const opt = document.createElement("option");
        opt.value = index;
        opt.textContent = voice.name;
        voiceSelect.appendChild(opt);
      });
      if (voices.length === 0) {
        const opt = document.createElement("option");
        opt.value = "-1";
        opt.textContent = "默认";
        voiceSelect.appendChild(opt);
      }
    }

    synth.onvoiceschanged = loadVoices;
    loadVoices();

    async function listFolders() {
      try {
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("API 返回格式错误");
        return data.filter(item => item.type === "dir").map(item => item.name);
      } catch (e) {
        showStatus("无法从 GitHub 加载文件夹列表：" + e.message, "error");
        return [];
      }
    }

    async function listTxtFiles(folderName) {
      try {
        const path = `${GITHUB_PATH}/${folderName}`;
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("API 返回格式错误");
        return data.filter(item => item.name.endsWith(".txt")).map(item => ({
          name: item.name,
          url: item.download_url
        }));
      } catch (e) {
        showStatus("无法加载文件列表：" + e.message, "error");
        return [];
      }
    }

    async function initFolderSelect() {
      const folders = await listFolders();
      folderSelect.innerHTML = "";
      folders.forEach(folder => {
        const opt = document.createElement("option");
        opt.value = folder;
        opt.textContent = folder;
        folderSelect.appendChild(opt);
      });
      if (folders.length > 0) {
        await updateNovelSelect(folderSelect.value);
      }
    }

    folderSelect.addEventListener("change", async () => {
      await updateNovelSelect(folderSelect.value);
    });

    async function updateNovelSelect(folderName) {
      const files = await listTxtFiles(folderName);
      novelSelect.innerHTML = "";
      files.forEach(file => {
        const opt = document.createElement("option");
        opt.value = file.url;
        opt.textContent = file.name;
        novelSelect.appendChild(opt);
      });
      if (files.length > 0) loadNovel(files[0].url);
    }

    novelSelect.addEventListener("change", () => {
      loadNovel(novelSelect.value);
    });

    chapterSelect.addEventListener("change", () => {
      currentChapter = parseInt(chapterSelect.value);
      showChapter(currentChapter);
    });

    async function loadNovel(fileURL) {
      try {
        showStatus("正在加载小说...", "info");
        const res = await fetch(fileURL);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const text = await res.text();
        splitChapters(text);
        currentChapter = 0;
        chapterSelect.value = 0;
        showChapter(0);
        showStatus("小说加载成功，共 " + chapters.length + " 章", "success");
      } catch (e) {
        showStatus("加载小说失败：" + e.message, "error");
      }
    }

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          splitChapters(event.target.result);
          currentChapter = 0;
          chapterSelect.value = 0;
          showChapter(0);
          showStatus("文件 " + file.name + " 加载成功，共 " + chapters.length + " 章", "success");
        };
        reader.onerror = () => {
          showStatus("文件读取失败", "error");
        };
        reader.readAsText(file, "UTF-8");
      }
    });

    function splitChapters(text) {
      chapters = [];
      const singleRe = /^第[\u4e00-\u9fa5\d]{1,30}(章|回|节|集|卷|篇).*$/;
      const volChapRe = /^第[\u4e00-\u9fa5\d]{1,30}卷.*?第[\u4e00-\u9fa5\d]{1,30}(章|回|节|集).*$/;
      const lines = text.split(/\r?\n/);
      let cur = { title: "开始", content: "" };

      for (const raw of lines) {
        const line = raw.trim();
        if (singleRe.test(line) || volChapRe.test(line)) {
          if (cur.content) chapters.push(cur);
          cur = { title: line, content: "" };
        } else {
          cur.content += raw + "\n";
        }
      }
      if (cur.content) chapters.push(cur);
      populateChapterSelect();
    }

    function populateChapterSelect() {
      chapterSelect.innerHTML = "";
      chapters.forEach((c, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = c.title;
        chapterSelect.appendChild(opt);
      });
    }

    function showChapter(i) {
      if (chapters[i]) textDisplay.value = chapters[i].content;
    }

    function play() {
      if (synth.speaking || synth.pending) synth.cancel();
      const minutes = parseInt(timerInput.value);
      endTime = minutes > 0 ? Date.now() + minutes * 60000 : null;
      speakNextChapter(currentChapter);
      showStatus("开始朗读...", "info");
    }

    function speakNextChapter(idx) {
      if (endTime && Date.now() >= endTime) {
        showStatus("朗读时间已到，已自动停止。", "info");
        return;
      }
      if (!chapters[idx]) {
        showStatus("朗读完毕！", "success");
        return;
      }
      currentChapter = idx;
      chapterSelect.value = idx;
      textDisplay.value = chapters[idx].content;

      utterance = new SpeechSynthesisUtterance(chapters[idx].content);
      utterance.lang = "zh-CN";
      utterance.rate = parseFloat(rateInput.value);
      utterance.pitch = parseFloat(pitchInput.value);
      utterance.volume = parseFloat(volumeInput.value);
      
      if (voices.length > 0 && voiceSelect.value !== "-1") {
        utterance.voice = voices[parseInt(voiceSelect.value)];
      }

      utterance.onend = () => {
        if (!synth.paused && (!endTime || Date.now() < endTime))
          speakNextChapter(idx + 1);
      };
      synth.speak(utterance);
    }

    function pause() {
      if (synth.speaking && !synth.paused) {
        synth.pause();
        showStatus("已暂停", "info");
      } else if (synth.paused) {
        synth.resume();
        showStatus("继续朗读...", "info");
      }
    }

    function stop() {
      synth.cancel();
      endTime = null;
      showStatus("已停止", "info");
    }

    function prevChapter() {
      if (currentChapter > 0) {
        stop();
        currentChapter--;
        chapterSelect.value = currentChapter;
        showChapter(currentChapter);
      }
    }

    function nextChapter() {
      if (currentChapter < chapters.length - 1) {
        stop();
        currentChapter++;
        chapterSelect.value = currentChapter;
        showChapter(currentChapter);
      }
    }

    initFolderSelect();
  </script>
</body>
</html>
